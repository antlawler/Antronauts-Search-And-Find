<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antronauts: Search-and-Find</title>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- config.js loads first so all settings are available before the game boots -->
  <script src="config.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-title" id="header-title"></div>
    <button class="header-btn" id="play-again-btn"></button>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- Scene --->
    <div class="scene-wrap" id="scene-wrap">
      <img class="scene-img" id="scene-img" alt="Search scene" draggable="false">
      <!-- Toast lives here so left:50% centres over the scene, not full viewport -->
      <div class="toast" id="toast"></div>
    </div>

    <!-- Sideebar -->
    <aside class="sidebar">
      <div class="char-key-header">
        <div class="char-key-title-row">
          <svg class="magnifier" viewBox="0 0 26 26" fill="none">
            <circle cx="10" cy="10" r="6.5" stroke="#5bc8f5" stroke-width="2.2" />
            <line x1="15" y1="15" x2="23" y2="23" stroke="#5bc8f5" stroke-width="2.2" stroke-linecap="round" />
          </svg>
          <div class="char-key-title" id="sidebar-title"></div>
          <svg class="magnifier" viewBox="0 0 26 26" fill="none" style="transform:scaleX(-1)">
            <circle cx="10" cy="10" r="6.5" stroke="#5bc8f5" stroke-width="2.2" />
            <line x1="15" y1="15" x2="23" y2="23" stroke="#5bc8f5" stroke-width="2.2" stroke-linecap="round" />
          </svg>
        </div>
        <div class="find-label" id="find-label"></div>
      </div>

      <div class="char-grid" id="char-grid"></div>

      <div class="footer">
        <div class="progress-pill" id="progress-pill"></div>
        <button class="hint-btn" id="hint-btn"></button>
      </div>
    </aside>

  </div>

  <!-- Win screen -->
  <div class="win-overlay" id="win-overlay">
    <div class="win-box">
      <div class="win-stars">⭐⭐⭐</div>
      <div class="win-title" id="win-title"></div>
      <div class="win-sub" id="win-sub"></div>
      <button class="win-btn" id="win-btn"></button>
    </div>
  </div>

  <script>
    // ============================================================
    //  GAME ENGINE — do not edit this file
    //  All customisation lives in config.js
    // ============================================================
    (function () {

      // ── Apply theme CSS variables ──────────────────────────────
      const t = CONFIG.theme;
      const root = document.documentElement.style;
      root.setProperty('--bg', t.backgroundColor);
      root.setProperty('--sidebar', t.sidebarColor);
      root.setProperty('--header', t.headerColor);
      root.setProperty('--accent', t.accentColor);
      root.setProperty('--accent-dark', t.accentDark);
      root.setProperty('--accent-light', t.accentLight);
      root.setProperty('--text-light', t.textLight);
      root.setProperty('--text-dim', t.textDim);

      // ── Apply text labels ──────────────────────────────────────
      const L = CONFIG.labels;
      document.title = L.gameTitle;
      document.getElementById('header-title').textContent = L.gameTitle;
      document.getElementById('play-again-btn').textContent = L.playAgainButton;
      document.getElementById('find-label').textContent = L.findLabel;
      document.getElementById('win-title').textContent = L.winTitle;
      document.getElementById('win-sub').textContent = L.winSubtitle;
      document.getElementById('win-btn').textContent = L.playAgainButton;

      // Rainbow letter sidebar title
      const titleEl = document.getElementById('sidebar-title');
      L.sidebarTitle.split('').forEach(ch => {
        const s = document.createElement('span');
        s.textContent = ch;
        if (ch === ' ') s.style.display = 'inline-block';
        titleEl.appendChild(s);
      });

      // ── Load scene image ───────────────────────────────────────
      document.getElementById('scene-img').src = CONFIG.sceneImage;

      // ── Character state ────────────────────────────────────────
      const chars = CONFIG.characters.map((c, i) => ({ ...c, found: false, num: i + 1 }));
      let hintsLeft = CONFIG.hintsAllowed ?? 3;

      // ── Build character grid ───────────────────────────────────
      const grid = document.getElementById('char-grid');

      function buildGrid() {
        grid.innerHTML = '';
        const NS = 'http://www.w3.org/2000/svg';

        chars.forEach(ch => {
          const cell = document.createElement('div');
          cell.className = 'char-cell';
          cell.id = 'cell-' + ch.id;
          cell.title = ch.hint || ch.name;

          // ── Ring wrapper ──
          const wrap = document.createElement('div');
          wrap.className = 'char-ring-wrap';

          // Portrait circle (white, ready for image)
          const portrait = document.createElement('div');
          portrait.className = 'char-portrait';
          if (ch.image) {
            const img = document.createElement('img');
            img.src = ch.image;
            img.alt = ch.name;
            portrait.appendChild(img);
          }

          // SVG ring
          const svg = document.createElementNS(NS, 'svg');
          svg.setAttribute('viewBox', '0 0 66 66');

          const bg = document.createElementNS(NS, 'circle');
          bg.setAttribute('cx', '33'); bg.setAttribute('cy', '33'); bg.setAttribute('r', '30');
          bg.setAttribute('fill', 'none'); bg.setAttribute('stroke', 'rgba(0,0,0,0.35)');
          bg.setAttribute('stroke-width', '5');

          const ring = document.createElementNS(NS, 'circle');
          ring.setAttribute('cx', '33'); ring.setAttribute('cy', '33'); ring.setAttribute('r', '30');
          ring.setAttribute('fill', 'none');
          ring.setAttribute('stroke', ch.ringColor || '#888');
          ring.setAttribute('stroke-width', '4');
          ring.setAttribute('stroke-linecap', 'round');
          ring.setAttribute('stroke-dasharray', '148 40');
          ring.setAttribute('stroke-dashoffset', '-8');

          svg.appendChild(bg);
          svg.appendChild(ring);

          // Number badge
          const num = document.createElement('div');
          num.className = 'char-num';
          num.style.background = ch.numColor || '#555';
          num.textContent = ch.num;

          // Found checkmark
          const check = document.createElement('div');
          check.className = 'char-check';
          check.textContent = '✓';

          wrap.appendChild(portrait);
          wrap.appendChild(svg);
          wrap.appendChild(num);
          wrap.appendChild(check);

          // Status pill
          const status = document.createElement('div');
          status.className = 'char-status not-found';
          status.id = 'status-' + ch.id;
          status.textContent = 'FIND';

          // Name label
          const name = document.createElement('div');
          name.className = 'char-name';
          name.textContent = ch.name.replace('\\n', '\n');

          cell.appendChild(name);
          cell.appendChild(wrap);
          cell.appendChild(status);
          grid.appendChild(cell);
        });
      }

      // ── Progress bar ───────────────────────────────────────────
      function updateProgress() {
        const found = chars.filter(c => c.found).length;
        const total = chars.length;
        document.getElementById('progress-pill').textContent =
          `${CONFIG.labels.progressPrefix} ${found}/${total}`;
        if (found === total) {
          setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 900);
        }
      }

      // ── Toast ──────────────────────────────────────────────────
      let toastTimer;
      function toast(msg, type = 'hit', duration = 1900) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.className = 'toast'; }, duration);
      }

      // ── Coordinate helpers ─────────────────────────────────────
      function imgLayout() {
        const img = document.getElementById('scene-img');
        const wrap = document.getElementById('scene-wrap');
        const wr = wrap.getBoundingClientRect();
        const ia = img.naturalWidth / img.naturalHeight;
        const wa = wr.width / wr.height;
        let rW, rH, ox, oy;
        if (ia > wa) { rW = wr.width; rH = wr.width / ia; ox = 0; oy = (wr.height - rH) / 2; }
        else { rH = wr.height; rW = wr.height * ia; oy = 0; ox = (wr.width - rW) / 2; }
        return { rW, rH, ox, oy };
      }

      function clickToPct(cx, cy) {
        const { rW, rH, ox, oy } = imgLayout();
        return { px: ((cx - ox) / rW) * 100, py: ((cy - oy) / rH) * 100 };
      }

      function pctToPixel(px, py) {
        const { rW, rH, ox, oy } = imgLayout();
        return { x: ox + (px / 100) * rW, y: oy + (py / 100) * rH };
      }

      // ── Ripple ─────────────────────────────────────────────────
      function ripple(cx, cy, hit) {
        const r = document.createElement('div');
        r.className = 'ripple' + (hit ? '' : ' miss');
        r.style.left = cx + 'px'; r.style.top = cy + 'px';
        document.getElementById('scene-wrap').appendChild(r);
        r.addEventListener('animationend', () => r.remove());
      }

      // ── Found marker ───────────────────────────────────────────
      function placeMarker(ch) {
        const { x, y } = pctToPixel(ch.x, ch.y);
        const m = document.createElement('div');
        m.className = 'found-marker';
        m.style.left = x + 'px'; m.style.top = y + 'px';
        m.dataset.id = ch.id;
        document.getElementById('scene-wrap').appendChild(m);
      }

      window.addEventListener('resize', () => {
        document.querySelectorAll('.found-marker').forEach(m => {
          const ch = chars.find(c => c.id === m.dataset.id);
          if (!ch) return;
          const { x, y } = pctToPixel(ch.x, ch.y);
          m.style.left = x + 'px'; m.style.top = y + 'px';
        });
      });

      // ── Scene click ────────────────────────────────────────────
      document.getElementById('scene-wrap').addEventListener('click', function (e) {
        const r = this.getBoundingClientRect();
        const cx = e.clientX - r.left;
        const cy = e.clientY - r.top;
        const { px, py } = clickToPct(cx, cy);

        // — Uncomment the line below to calibrate x/y in config.js —
        // console.log('x:', px.toFixed(1), 'y:', py.toFixed(1));

        let hit = null;
        for (const ch of chars) {
          if (ch.found) continue;
          if (Math.hypot(px - ch.x, py - ch.y) <= ch.radius) { hit = ch; break; }
        }

        if (hit) {
          hit.found = true;
          ripple(cx, cy, true);
          placeMarker(hit);
          document.getElementById('cell-' + hit.id).classList.add('found');
          const s = document.getElementById('status-' + hit.id);
          s.className = 'char-status is-found';
          s.textContent = 'FOUND!';
          toast('✓ Found ' + hit.name.replace('\\n', ' '), 'hit', 1000);
          updateProgress();
        } else {
          const onFound = chars.some(c => c.found && Math.hypot(px - c.x, py - c.y) <= c.radius);
          if (!onFound) { ripple(cx, cy, false); toast('Keep looking…', 'miss'); }
        }
      });

      // ── Magnifier Loupe ────────────────────────────────────────
      const ZOOM = 2.5;
      const LOUPE_SIZE = 160;

      const loupe = document.createElement('div');
      loupe.className = 'loupe';
      document.getElementById('scene-wrap').appendChild(loupe);

      document.getElementById('scene-wrap').addEventListener('mousemove', function (e) {
        const r = this.getBoundingClientRect();
        const cx = e.clientX - r.left;
        const cy = e.clientY - r.top;

        // Position loupe centred on cursor
        loupe.style.left = (cx - LOUPE_SIZE / 2) + 'px';
        loupe.style.top = (cy - LOUPE_SIZE / 2) + 'px';
        loupe.style.display = 'block';

        // Calculate zoomed background
        const { rW, rH, ox, oy } = imgLayout();
        const bgW = rW * ZOOM;
        const bgH = rH * ZOOM;
        const bgX = -((cx - ox) * ZOOM - LOUPE_SIZE / 2);
        const bgY = -((cy - oy) * ZOOM - LOUPE_SIZE / 2);

        loupe.style.backgroundImage = `url('${CONFIG.sceneImage}')`;
        loupe.style.backgroundSize = `${bgW}px ${bgH}px`;
        loupe.style.backgroundPosition = `${bgX}px ${bgY}px`;
      });

      document.getElementById('scene-wrap').addEventListener('mouseleave', function () {
        loupe.style.display = 'none';
      });

      // ── Magnifier Loupe — Touch Support ───────────────────────
      const sceneWrap = document.getElementById('scene-wrap');
      let longPressTimer = null;
      let dwellTarget = null;
      let dwellRing = null;
      const DWELL_TIME = 2500;
      const DWELL_RADIUS = 8;

      function removeDwellRing() {
        if (dwellRing) { dwellRing.remove(); dwellRing = null; }
        clearTimeout(longPressTimer);
        dwellTarget = null;
      }

      function startDwell(ch) {
        if (dwellTarget === ch) return;
        removeDwellRing();
        dwellTarget = ch;

        // Place the ring at the loupe's centre (finger position - 80px offset)
        // rather than the character's scene position
        const loupeLeft = parseFloat(loupe.style.left) + LOUPE_SIZE / 2;
        const loupeTop = parseFloat(loupe.style.top) + LOUPE_SIZE / 2;

        dwellRing = document.createElement('div');
        dwellRing.className = 'dwell-ring';
        dwellRing.style.left = loupeLeft + 'px';
        dwellRing.style.top = loupeTop + 'px';
        dwellRing.style.animationDuration = DWELL_TIME + 'ms';
        sceneWrap.appendChild(dwellRing);

        longPressTimer = setTimeout(() => {
          if (dwellTarget !== ch) return;
          ch.found = true;
          const { x, y } = pctToPixel(ch.x, ch.y);
          ripple(x, y, true);
          placeMarker(ch);
          document.getElementById('cell-' + ch.id).classList.add('found');
          const s = document.getElementById('status-' + ch.id);
          s.className = 'char-status is-found';
          s.textContent = 'FOUND!';
          toast('✓ Found ' + ch.name.replace('\\n', ' '), 'hit', 1000);
          updateProgress();
          removeDwellRing();
        }, DWELL_TIME);
      }

      function updateLoupeFromTouch(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const r = sceneWrap.getBoundingClientRect();
        const cx = touch.clientX - r.left;
        const cy = touch.clientY - r.top;

        // Position loupe above finger
        const loupeX = cx - LOUPE_SIZE / 2;
        const loupeY = cy - LOUPE_SIZE / 2 - 80;
        loupe.style.left = loupeX + 'px';
        loupe.style.top = loupeY + 'px';
        loupe.style.display = 'block';

        const { rW, rH, ox, oy } = imgLayout();
        const bgW = rW * ZOOM;
        const bgH = rH * ZOOM;
        const bgX = -((cx - ox) * ZOOM - LOUPE_SIZE / 2);
        const bgY = -((cy - oy) * ZOOM - LOUPE_SIZE / 2);

        loupe.style.backgroundImage = `url('${CONFIG.sceneImage}')`;
        loupe.style.backgroundSize = `${bgW}px ${bgH}px`;
        loupe.style.backgroundPosition = `${bgX}px ${bgY}px`;

        // ── The loupe crosshair centre in scene coordinates ──
        // The loupe center is at (cx, cy - 80) in wrap pixels
        // Convert that point to scene percentage for hit detection
        const loupeCentreX = cx;
        const loupeCentreY = cy - 80; // same offset used to position the loupe
        const { px, py } = clickToPct(loupeCentreX, loupeCentreY);

        let near = null;
        for (const ch of chars) {
          if (ch.found) continue;
          if (Math.hypot(px - ch.x, py - ch.y) <= DWELL_RADIUS) { near = ch; break; }
        }

        if (near) {
          startDwell(near);
        } else {
          removeDwellRing();
        }
      }

      sceneWrap.addEventListener('touchstart', updateLoupeFromTouch, { passive: false });
      sceneWrap.addEventListener('touchmove', updateLoupeFromTouch, { passive: false });
      sceneWrap.addEventListener('touchend', () => { removeDwellRing(); loupe.style.display = 'none'; });
      sceneWrap.addEventListener('touchcancel', () => { removeDwellRing(); loupe.style.display = 'none'; });

      const hintBtn = document.getElementById('hint-btn');

      function refreshHintBtn() {
        hintBtn.textContent = `${L.hintButton} (${hintsLeft})`;
        hintBtn.disabled = hintsLeft === 0;
      }

      hintBtn.addEventListener('click', () => {
        if (hintsLeft <= 0) return;
        const pool = chars.filter(c => !c.found);
        if (!pool.length) return;
        const target = pool[Math.floor(Math.random() * pool.length)];
        hintsLeft--;
        refreshHintBtn();

        const { x, y } = pctToPixel(target.x, target.y);
        const spot = document.createElement('div');
        spot.className = 'hint-spot';
        spot.style.left = x + 'px'; spot.style.top = y + 'px';
        document.getElementById('scene-wrap').appendChild(spot);
        spot.addEventListener('animationend', () => spot.remove());

        toast('Hint: ' + target.hint, 'hint');
      });

      // ── Play Again ─────────────────────────────────────────────
      function resetGame() {
        chars.forEach(ch => {
          ch.found = false;
          document.getElementById('cell-' + ch.id)?.classList.remove('found');
          const s = document.getElementById('status-' + ch.id);
          if (s) { s.className = 'char-status not-found'; s.textContent = 'FIND'; }
        });
        document.querySelectorAll('.found-marker').forEach(m => m.remove());
        document.getElementById('win-overlay').classList.remove('show');
        hintsLeft = CONFIG.hintsAllowed ?? 3;
        refreshHintBtn();
        updateProgress();
      }

      document.getElementById('play-again-btn').addEventListener('click', resetGame);
      document.getElementById('win-btn').addEventListener('click', resetGame);

      // ── Boot ───────────────────────────────────────────────────
      buildGrid();
      updateProgress();
      refreshHintBtn();

    })();
  </script>

</body>

</html>
